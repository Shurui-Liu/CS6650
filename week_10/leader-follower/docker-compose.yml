services:
  follower1:
    build: .
    environment:
      ROLE: follower
      PORT: "8080"
    ports:
      - "8081:8080"

  follower2:
    build: .
    environment:
      ROLE: follower
      PORT: "8080"
    ports:
      - "8082:8080"

  follower3:
    build: .
    environment:
      ROLE: follower
      PORT: "8080"
    ports:
      - "8083:8080"

  follower4:
    build: .
    environment:
      ROLE: follower
      PORT: "8080"
    ports:
      - "8084:8080"

  leader:
    build: .
    environment:
      ROLE: leader
      PORT: "8080"
      FOLLOWERS: "http://follower1:8080,http://follower2:8080,http://follower3:8080,http://follower4:8080"
      W: "${W:-5}"   # override with: W=1 docker compose up -d
      R: "${R:-1}"   # override with: R=5 docker compose up -d
    ports:
      - "8080:8080"
    depends_on:
      - follower1
      - follower2
      - follower3
      - follower4
